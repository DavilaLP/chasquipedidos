<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrito | ChasquiPedidos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/carrito.css}">

</head>

<body>

<nav class="navbar custom-navbar">
    <div class="container">
        <a class="navbar-brand logo" th:href="@{/}">
            ChasquiPedidos
        </a>
    </div>
</nav>

<section class="cart-section">

    <div class="container">

        <div class="row g-4">

            <div class="col-lg-7">

                <div class="cart-panel">

                    <div class="panel-header">
                        <h2>Tu pedido</h2>
                        <span>3 productos</span>
                    </div>

                    <div class="cart-item">
                        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591">

                        <div class="item-content">
                            <h4>Pizza Familiar</h4>
                            <p>Extra queso y gaseosa</p>

                            <div class="quantity">
                                <button onclick="changeQty(this, -1)">-</button>
                                <span class="qty">1</span>
                                <button onclick="changeQty(this, 1)">+</button>
                            </div>
                        </div>

                        <div class="item-price">S/ 45</div>

                        <button onclick="removeItem(this)">✕</button>
                    </div>

                    <div class="cart-item">
                        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">

                        <div class="item-content">
                            <h4>Hamburguesa Doble</h4>
                            <p>Papas grandes incluidas</p>

                            <div class="quantity">
                                <button onclick="changeQty(this, -1)">-</button>
                                <span class="qty">1</span>
                                <button onclick="changeQty(this, 1)">+</button>
                            </div>
                        </div>

                        <div class="item-price">S/ 28</div>

                        <button onclick="removeItem(this)">✕</button>
                    </div>

                    <div class="cart-item">
                        <img src="https://images.unsplash.com/photo-1600891964092-4316c288032e">

                        <div class="item-content">
                            <h4>Pollo Broaster</h4>
                            <p>Con cremas y papas</p>

                            <div class="quantity">
                                <button onclick="changeQty(this, -1)">-</button>
                                <span class="qty">1</span>
                                <button onclick="changeQty(this, 1)">+</button>
                            </div>
                        </div>

                        <div class="item-price">S/ 32</div>

                        <button onclick="removeItem(this)">✕</button>
                    </div>

                </div>

            </div>

            <div class="col-lg-5">

                <div class="payment-panel">

                    <h3>Método de pago</h3>

                    <div class="payment-method">
                        Contra entrega
                    </div>

                    <div class="address-box">
                        <h4>Dirección</h4>
                        <input type="text" placeholder="Ingresa tu dirección">
                    </div>

                    <div class="address-box">
                        <h4>Referencia</h4>
                        <textarea placeholder="Ejemplo: Casa azul frente al parque"></textarea>
                    </div>

                    <div class="total-box">

                        <div class="total-row">
                            <span>Subtotal</span>
                            <span>S/ 0</span>
                        </div>

                        <div class="total-row">
                            <span>Delivery</span>
                            <span>S/ 0</span>
                        </div>

                        <div class="total-row final-total">
                            <span>Total</span>
                            <span>S/ 0</span>
                        </div>

                    </div>

                    <button class="pay-btn">
                        Confirmar pedido
                    </button>

                </div>

            </div>

        </div>

    </div>

</section>

<script th:src="@{/js/carrito.js}"></script>

</body>
</html>
