<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrito | ChasquiPedidos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/carrito.css}">

</head>

<body>

<nav class="navbar custom-navbar">
    <div class="container">
        <a class="navbar-brand logo" th:href="@{/}">
            ChasquiPedidos
        </a>
    </div>
</nav>

<section class="cart-section">

    <div class="container">

        <div class="row g-4">

            <div class="col-lg-7">

                <div class="cart-panel">

                    <div class="panel-header">
                        <h2>Tu pedido</h2>
                        <span>Cargando...</span>
                    </div>

                </div>

            </div>

            <div class="col-lg-5">

                <div class="payment-panel">

                    <h3>Método de pago</h3>

                    <div class="payment-method">
                        Contra entrega
                    </div>

                    <div class="address-box">
                        <h4>Dirección</h4>
                        <input type="text" placeholder="Ingresa tu dirección">
                    </div>

                    <div class="address-box">
                        <h4>Referencia</h4>
                        <textarea placeholder="Ejemplo: Casa azul frente al parque"></textarea>
                    </div>

                    <div class="total-box">

                        <div class="total-row">
                            <span>Subtotal</span>
                            <span>S/ 0</span>
                        </div>

                        <div class="total-row">
                            <span>Delivery</span>
                            <span>S/ 0</span>
                        </div>

                        <div class="total-row final-total">
                            <span>Total</span>
                            <span>S/ 0</span>
                        </div>

                    </div>

                    <button class="pay-btn">
                        Confirmar pedido
                    </button>

                </div>

            </div>

        </div>

    </div>

</section>

<script th:src="@{/js/carrito.js}"></script>

</body>
</html>
